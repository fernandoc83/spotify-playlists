services:
  spotify-playlists:
    build: .
    container_name: spotify-playlists
    restart: unless-stopped
    # DNS explícito: evita "Temporary failure in name resolution" cuando el
    # homeserver usa un DNS propio (Pi-hole, systemd-resolved) que el contenedor
    # no alcanza. Si tenés un DNS local, poné su IP antes de los públicos.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    # Toda la config (credenciales + horario) vive en .env, que NO está en el
    # repo. Así podés cambiar FRECUENCIA/HORA/etc. sin tocar este archivo ni
    # generar conflictos al hacer git pull. Ver .env.example para las variables.
    env_file:
      - .env
    volumes:
      # el token OAuth: persiste y se refresca solo entre corridas.
      # OJO: es un archivo, no un directorio. Debe existir antes de levantar.
      - ./.cache:/app/.cache

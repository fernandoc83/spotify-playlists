services:
  spotify-playlists:
    build: .
    container_name: spotify-playlists
    restart: unless-stopped
    # DNS explícito: evita "Temporary failure in name resolution" cuando el
    # homeserver usa un DNS propio (Pi-hole, systemd-resolved) que el contenedor
    # no alcanza. Si tenés un DNS local, poné su IP antes de los públicos.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      # --- cada cuánto regenerar las playlists ---
      FRECUENCIA: "semanal"   # diario | semanal | mensual
      HORA: "9"               # 0-23
      MINUTO: "0"             # 0-59
      DIA_SEMANA: "0"         # solo si FRECUENCIA=semanal (0=lunes … 6=domingo)
      DIA_MES: "1"            # solo si FRECUENCIA=mensual (1-31; se ajusta si el mes es más corto)
      RUN_ON_START: "0"       # "1" = corre una vez al levantar el contenedor
      # zona horaria (para que HORA sea tu hora local)
      TZ: "America/Argentina/Buenos_Aires"
    env_file:
      - .env               # SPOTIPY_CLIENT_ID / SECRET / REDIRECT_URI
    volumes:
      # el token OAuth: persiste y se refresca solo entre corridas.
      # OJO: es un archivo, no un directorio. Debe existir antes de levantar.
      - ./.cache:/app/.cache
